apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "write-to-kafka.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "write-to-kafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "write-to-kafka.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "write-to-kafka.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.env | toJson | sha256sum }}
    spec:
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      restartPolicy: Always

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          volumeMounts:
            - name: krb5-config
              mountPath: {{ .Values.krb5Config.mountPath }}
              readOnly: true
            {{- range .Values.pointsFiles }}
            - name: points-{{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}

          livenessProbe:
            exec:
              command:
                - pgrep
                - write-to-kafka
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: krb5-config
          hostPath:
            path: {{ .Values.krb5Config.hostPath }}
            type: File
        {{- range .Values.pointsFiles }}
        - name: points-{{ .name }}
          hostPath:
            path: {{ .hostPath }}
            type: File
        {{- end }}
